general {
    lock_cmd = echo lc          # dbus/sysd lock command (loginctl lock-session)
    unlock_cmd = echo uc      # same as above, but unlock
    before_sleep_cmd = echo bs    # command ran before sleep
    after_sleep_cmd = systemctl --user restart hyprsunset.service  # command ran after sleep
    ignore_dbus_inhibit = false             # whether to ignore dbus-sent idle-inhibit requests (used by e.g. firefox or steam)
    ignore_systemd_inhibit = false          # whether to ignore systemd-inhibit --what=idle inhibitors
    ignore_wayland_inhibit = true          # whether to ignore systemd-inhibit --what=idle inhibitors
}

listener {
    timeout = 600                            # in seconds, 600
    on-timeout = hyprctl dispatch "hl.dsp.dpms({ state = \"off\" })"  # command to run on timeout
    on-resume = hyprctl dispatch "hl.dsp.dpms({ state = \"on\" })"    # command to run on resume
}

listener {
    timeout = 610                            # in seconds, 610
    on-timeout = ~/.config/hypr/lights.sh off
    on-resume = ~/.config/hypr/lights.sh on
}
