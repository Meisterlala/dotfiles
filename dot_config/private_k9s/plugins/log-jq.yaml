plugins:
  # Streams pod logs through jq without requiring the kubectl-jq plugin.
  jqlogs:
    shortCut: Ctrl-J
    confirm: false
    description: "Logs (jq)"
    scopes:
      - po
    command: sh
    background: false
    args:
      - -c
      - kubectl logs --context "$3" --namespace "$2" "$1" --follow --ignore-errors=true | jq --unbuffered -R 'fromjson? // .'
      - --
      - $NAME
      - $NAMESPACE
      - $CONTEXT
