plugins:
  # Starts a local Loki port-forward on first use, then queries it with logcli.
  loki-container:
    shortCut: Shift-L
    description: "loki fmt"
    scopes:
      - containers
    command: sh
    background: false
    args:
      - -c
      - exec "${XDG_CONFIG_HOME:-$HOME/.config}/k9s/plugins/loki-logcli" "$@"
      - --
      - $CONTEXT
      - '{namespace="$NAMESPACE",pod="$POD",container="$NAME"}'
      - --quiet
      - -f
  loki-container-raw:
    shortCut: Ctrl-E
    description: "loki raw"
    scopes:
      - containers
    command: sh
    background: false
    args:
      - -c
      - exec "${XDG_CONFIG_HOME:-$HOME/.config}/k9s/plugins/loki-logcli" "$@"
      - --
      - $CONTEXT
      - '{namespace="$NAMESPACE",pod="$POD",container="$NAME"}'
      - --quiet
      - -f
      - -o
      - raw
